<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handover HQ 로그인 링크</title>
  </head>
  <body style="margin:0; background:#eef3f8; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; color:#0f1e32;">
    <div style="width:100%; padding:32px 16px;">
      <div style="max-width:560px; margin:0 auto; background:#ffffff; border-radius:28px; overflow:hidden; box-shadow:0 18px 50px rgba(15,30,50,0.08);">
        <div style="padding:32px 32px 24px; background:linear-gradient(135deg,#ffffff 0%,#eef3ff 100%); border-bottom:1px solid #eef3f8;">
          <div style="font-size:12px; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:#5f6e82;">
            Handover HQ
          </div>
          <h1 style="margin:18px 0 0; font-size:30px; line-height:1.25; color:#0f1e32;">
            {{ if .Data.display_name }}{{ .Data.display_name }}님, 로그인 링크가 도착했어요{{ else }}Handover HQ 로그인 링크가 도착했어요{{ end }}
          </h1>
          <p style="margin:14px 0 0; font-size:15px; line-height:1.7; color:#5f6e82;">
            아래 버튼으로 다시 들어오면 방금 보던 해커톤 화면과 작업 흐름이 이어집니다.
          </p>
        </div>

        <div style="padding:32px;">
          <a
            href="{{ .ConfirmationURL }}"
            style="display:inline-block; padding:15px 24px; border-radius:999px; background:#0064ff; color:#ffffff; text-decoration:none; font-size:15px; font-weight:700;"
          >
            Handover HQ로 로그인하기
          </a>

          <div style="margin-top:28px; padding:18px 20px; border-radius:20px; background:#f6f9fc;">
            <div style="font-size:12px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:#5f6e82;">
              참고
            </div>
            <p style="margin:10px 0 0; font-size:14px; line-height:1.8; color:#5f6e82;">
              본인이 요청한 메일이 아니라면 이 메일은 무시해도 됩니다. 버튼이 열리지 않으면 아래 주소를 직접 열어주세요.
            </p>
            <p style="margin:12px 0 0; word-break:break-all; font-size:13px; line-height:1.7; color:#0f1e32;">
              {{ .ConfirmationURL }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
